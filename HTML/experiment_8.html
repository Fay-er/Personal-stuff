<html>
<link rel="stylesheet" href="experiment_8.css">
<head><title>Experiment No. 8</title></head>

<body>
	<form>
		<fieldset>
			<legend>Enter Your Details:</legend>

			<label for="name_box">Input Your Name:</label>
			<input type="text" name="name_box" id="name_box">

			<br>

			<label for="email_box">Your Email ID:</label>
			<input type="text" name="email_box" id="email_box">
		</fieldset>

		<fieldset>
			<legend>Your Feedback:</legend>

			<label for="dropdown">How did you come to know about the company?</label>
			<select name="dropdown" id="dropdown">
				<option name="dropdown_1" value="newspaper">Newspaper</option>
				<option name="dropdown_2" value="friend">Friend</option>
				<option name="dropdown_3" value="website">Website</option>
				<option name="dropdown_4" value="others">Others</option>
			</select>

			<br>

			Would you like to come again?

			<br>

			<label>
			<input type="radio" name="radio_1" id="radio_1" value="yes">Yes
			</label>

			<label>
			<input type="radio" name="radio_2" id="radio_2" value="no">No
			</label>

			<label>
			<input type="radio" name="radio_3" id="radio_3" value="unsure">Not sure
			</label>

			<br>

			Comments:

			<br>

			<textarea name="feedback" id="feedback"></textarea>

			<br>

			<label>
			<input type="checkbox" name="agree" id="agree">
			Sign me up for email updates
			</label>

<br>

			<input type="submit" value="Submit">
		</fieldset>
	</form>
</body>
</html>
